<script>
        function toggleModal() {
            const modal = document.getElementById('sideModal');
            modal.classList.toggle('translate-x-full');
        }

        function switchTab(tabId) {
            // Hide all contents
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            // Show target content
            document.getElementById('content-' + tabId).classList.remove('hidden');

            // Reset tab styles
            const tabs = ['proprietes', 'effets', 'commentaires'];
            tabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                el.classList.remove('border-primary', 'text-primary');
                el.classList.add('border-transparent', 'text-on-surface-variant');
            });

            // Highlight active tab
            const activeTab = document.getElementById('tab-' + tabId);
            activeTab.classList.remove('border-transparent', 'text-on-surface-variant');
            activeTab.classList.add('border-primary', 'text-primary');
        }

        function rotate(deg) {
            const preview = document.getElementById('modalPreview');
            preview.style.transform = `rotate(${deg}deg)`;
        }

        function applyEffect(filter) {
            const preview = document.getElementById('modalPreview');
            preview.style.filter = filter;
            
            // Visual feedback for selected button
            document.querySelectorAll('.effect-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary/5');
                btn.classList.add('border-outline-variant');
            });
            event.currentTarget.classList.add('border-primary', 'bg-primary/5');
            event.currentTarget.classList.remove('border-outline-variant');
        }

        // Initialize state
        window.onload = () => {
            setTimeout(() => toggleModal(), 500); // Auto-open for demo
        }
    </script>
